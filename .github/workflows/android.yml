name: Android Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build-android:
    runs-on: windows-2022 # Pin to older version that has Xamarin support built-in

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: nuget restore LumiContact.sln

    - name: Build Android APK
      run: msbuild LumiContact/LumiContact.Android/LumiContact.Android.csproj /verbosity:normal /t:Rebuild /t:SignAndroidPackage /p:Configuration=Release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LumiContact-Android-APK
        path: |
          LumiContact/LumiContact.Android/bin/Release/*-Signed.apk
          LumiContact/LumiContact.Android/bin/Release/*.apk
        if-no-files-found: error
